<nav class="site-nav">
  <div class="site-nav__inner">
    <a class="site-nav__brand" href="/">ThePeach</a>
    <div class="site-nav__links">
      <a href="/">Home</a>
      <a href="/applications/">Applications</a>
      <a href="/assets/">Assets</a>
      <a href="/api/v1/">API</a>
    </div>
    <div class="site-nav__auth">
      <button id="nav-signup-link" class="site-nav__action" type="button" data-auth-modal="signup">Sign Up</button>
      <button id="nav-login-link" class="site-nav__action" type="button" data-auth-modal="login">Login</button>
      <a id="nav-user-link" href="/auth/home/" hidden>User</a>
      <button id="nav-logout-link" class="site-nav__action" type="button" data-auth-modal="logout" hidden>Logout</button>
    </div>
  </div>
</nav>

<script>
  (async function syncNavbarAuthState() {
    const signupLink = document.getElementById("nav-signup-link");
    const loginLink = document.getElementById("nav-login-link");
    const userLink = document.getElementById("nav-user-link");
    const logoutLink = document.getElementById("nav-logout-link");

    window.thePeachSyncNavbarAuthState = syncNavbarAuthState;

    document.querySelectorAll("[data-auth-modal]").forEach((element) => {
      element.addEventListener("click", () => {
        if (window.thePeachAuthModal) {
          window.thePeachAuthModal.open(element.dataset.authModal);
        }
      });
    });

    function showLoggedOut() {
      signupLink.hidden = false;
      loginLink.hidden = false;
      userLink.hidden = true;
      logoutLink.hidden = true;
      userLink.textContent = "User";
    }

    showLoggedOut();

    const accessToken = localStorage.getItem("thepeach_access_token");

    if (!accessToken) {
      return;
    }

    try {
      const response = await fetch("/api/v1/auth/me/", {
        headers: { Authorization: `Bearer ${accessToken}` },
      });
      const payload = await response.json();

      if (!response.ok || !payload.success || !payload.data || !payload.data.email) {
        localStorage.removeItem("thepeach_access_token");
        localStorage.removeItem("thepeach_refresh_token");
        showLoggedOut();
        return;
      }

      const identifier = payload.data.email.split("@")[0] || "User";
      signupLink.hidden = true;
      loginLink.hidden = true;
      userLink.hidden = false;
      logoutLink.hidden = false;
      userLink.textContent = identifier;
    } catch (error) {
      showLoggedOut();
    }
  })();
</script>
