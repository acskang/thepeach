server {
    listen 80;
    server_name thepeach.thesysm.com;
    include proxy_params;
    include /etc/nginx/snippets/common_django_app.conf;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /admin/ {
        return 403;
    }

    location /api/v1/auth/internal/ {
        return 403;
    }

    location /api/v1/gateway/internal/ {
        return 403;
    }

    location /api/v1/gateway/tools/ {
        return 403;
    }

    location /static/ {
        alias /var/www/thepeach/static/;
        expires 30d;
    }

    location /media/ {
        alias /var/www/thepeach/media/;
    }
}
