server {
    listen 80;
    server_name ops.thesysm.com auth-internal.thesysm.com;
    include proxy_params;
    include /etc/nginx/snippets/common_django_app.conf;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Access-Authenticated-User-Email $http_cf_access_authenticated_user_email;
        proxy_set_header CF-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
    }

    location /static/ {
        alias /var/www/thepeach/static/;
        expires 30d;
    }

    location /media/ {
        alias /var/www/thepeach/media/;
    }
}
